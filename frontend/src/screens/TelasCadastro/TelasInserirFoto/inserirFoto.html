<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insira sua foto</title>
    <link rel="stylesheet" href="inserirFoto.css">
</head>
<body>
    <main class="container">
        <div class="photo-card">
            <header class="card-header">
                <div class="nav-icons">
                    <a href="dados-pessoais.html" class="icon-link">
                        <svg viewBox="0 0 24 24" width="28" height="28" fill="#1b7d3d">
                            <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                        </svg>
                    </a>
                    <a href="index.html" class="icon-link">
                        <svg viewBox="0 0 24 24" width="28" height="28" fill="#1b7d3d">
                            <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                        </svg>
                    </a>
                </div>
                <h1>Insira sua foto</h1>
            </header>

            <div class="avatar-container">
                <div class="avatar-circle" id="previewContainer">
                    <svg id="defaultAvatar" viewBox="0 0 24 24" fill="none" stroke="#1b7d3d" stroke-width="1.5">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2m8-10a4 4 0 1 0 0-8 4 4 0 0 0 0 8z" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <img id="imagePreview" src="" alt="Sua foto" style="display: none;">
                </div>
                
                <label for="photoUpload" class="camera-icon">
                    <svg viewBox="0 0 24 24" width="30" height="30" fill="#1b7d3d">
                        <path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/>
                        <circle cx="12" cy="12" r="3.2"/>
                    </svg>
                </label>
                <input type="file" id="photoUpload" accept="image/*" hidden>
            </div>

            <div class="footer-actions">
                <button type="button" id="btnFinish" class="btn-concluir">Concluir cadastro</button>
                <a href="#" class="skip-link">Inserir foto de perfil mais tarde</a>
            </div>
        </div>
    </main>
    <script src="inserirFoto.js"></script>
</body>
</html>
